name: "Bug report"
description: "Report a bug or regression."
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug.
        **Do not include secrets** (API keys, tokens, credentials).

  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the bug.
      placeholder: Camera close button navigates to the wrong screen...
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - low (minor annoyance)
        - medium (workaround exists)
        - high (blocks normal usage)
        - critical (data loss / security / crash)
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Screens / navigation
        - Camera
        - Submission flow
        - Auth
        - API
        - Permissions
        - Analytics
        - UX / design
        - CI / tooling
        - Other
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Tap ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: v0.1.0 or abc1234
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: Android 14 / iOS 18
        - Device: Pixel 8 / iPhone 15
        - Expo SDK: 56
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs, stack traces, or attach screenshots.
      render: shell
    validations:
      required: false
