name: CI
permissions:
  contents: read
  pull-requests: write
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress jobs if a developer pushes a new commit to the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Fixed typo: 'node-node-version' changed to 'node-version'
          cache: "npm" # Keeps your runners extremely fast by caching node_modules

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🧼 Lint code
        run: npx expo lint

      - name: 📐 Type check (TypeScript)
        run: npx tsc --noEmit

      - name: 🧪 Run tests
        run: npm test -- --coverage

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
